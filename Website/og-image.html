<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>Sophia Commons – OG Image</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }

    body {
      font-family: 'Nunito Sans', sans-serif;
      background-color: #F7F2EA;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Outer card */
    .card {
      width: 1200px;
      height: 630px;
      background: linear-gradient(160deg, #FAF6EE 0%, #F3EBD8 55%, #EFE4CC 100%);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 80px;
    }

    /* Corner accent lines */
    .card::before,
    .card::after {
      content: '';
      position: absolute;
      border-color: #B8923A;
      border-style: solid;
      width: 52px;
      height: 52px;
    }
    .card::before {
      top: 28px;
      left: 28px;
      border-width: 1.5px 0 0 1.5px;
    }
    .card::after {
      bottom: 28px;
      right: 28px;
      border-width: 0 1.5px 1.5px 0;
    }

    /* Additional corner accents via pseudo-elements on inner wrappers */
    .corner-tr,
    .corner-bl {
      position: absolute;
      width: 52px;
      height: 52px;
      border-color: #B8923A;
      border-style: solid;
    }
    .corner-tr {
      top: 28px;
      right: 28px;
      border-width: 1.5px 1.5px 0 0;
    }
    .corner-bl {
      bottom: 28px;
      left: 28px;
      border-width: 0 0 1.5px 1.5px;
    }

    /* Thin horizontal rule lines flanking the monogram */
    .rule-group {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
    }
    .rule {
      width: 56px;
      height: 1px;
      background: #B8923A;
      opacity: 0.75;
    }

    /* Monogram / sigil */
    .monogram {
      width: 52px;
      height: 52px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Outer ring */
    .monogram::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid #B8923A;
      opacity: 0.6;
    }
    /* Inner diamond */
    .monogram::after {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      border: 1px solid #B8923A;
      transform: rotate(45deg);
      opacity: 0.85;
    }
    /* Centre dot */
    .monogram-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #B8923A;
      position: relative;
      z-index: 1;
    }

    /* Content */
    .content {
      text-align: center;
      max-width: 880px;
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 82px;
      font-weight: 400;
      letter-spacing: 0.025em;
      color: #2C2217;
      line-height: 1.05;
      margin-bottom: 16px;
    }

    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.08em;
      color: #B8923A;
      text-transform: none;
      margin-bottom: 28px;
    }

    /* Thin divider */
    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #B8923A 30%, #B8923A 70%, transparent);
      margin: 0 auto 26px;
    }

    .description {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 19px;
      font-weight: 300;
      color: #5A4A38;
      line-height: 1.65;
      letter-spacing: 0.01em;
      max-width: 640px;
      margin: 0 auto;
    }

    /* Footer domain */
    .footer {
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .footer-line {
      width: 36px;
      height: 1px;
      background: #B8923A;
      opacity: 0.55;
    }
    .domain {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #9A7A50;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Corner accents (::before/::after handle top-left & bottom-right) -->
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>

    <!-- Decorative rule + sigil row -->
    <div class="rule-group">
      <div class="rule"></div>
      <div class="monogram"><div class="monogram-dot"></div></div>
      <div class="rule"></div>
    </div>

    <!-- Main content -->
    <div class="content">
      <h1 class="title">Sophia Commons</h1>
      <p class="subtitle">Anthroposophical Community Directory</p>
      <div class="divider"></div>
      <p class="description">Find Waldorf schools, biodynamic farms, Camphill communities, and more worldwide.</p>
    </div>

    <!-- Domain footer -->
    <div class="footer">
      <div class="footer-line"></div>
      <span class="domain">sophiacommons.org</span>
      <div class="footer-line"></div>
    </div>
  </div>
</body>
</html>
