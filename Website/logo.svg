<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Sophia Commons - Huguenot Cross Style Logo -->
  <defs>
    <style>
      .arm{fill:none;stroke:currentColor;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .star{fill:currentColor;stroke:none}
    </style>
  </defs>
  <g transform="translate(50,50)">
    <!-- Central star -->
    <polygon class="star" points="0,-12 3,-4 12,-4 5,2 7,11 0,6 -7,11 -5,2 -12,-4 -3,-4"/>

    <!-- Top fleur-de-lis arm -->
    <g class="arm">
      <path d="M0,-18 L0,-38"/>
      <path d="M-6,-28 Q-10,-38 -4,-42 Q0,-44 0,-38"/>
      <path d="M6,-28 Q10,-38 4,-42 Q0,-44 0,-38"/>
      <path d="M-3,-42 Q-6,-46 -2,-48 Q0,-49 2,-48 Q6,-46 3,-42"/>
      <!-- Small star at top -->
      <polygon class="star" points="0,-34 1.2,-31 4,-31 2,-29 3,-26 0,-28 -3,-26 -2,-29 -4,-31 -1.2,-31"/>
    </g>

    <!-- Right fleur-de-lis arm -->
    <g class="arm" transform="rotate(90)">
      <path d="M0,-18 L0,-38"/>
      <path d="M-6,-28 Q-10,-38 -4,-42 Q0,-44 0,-38"/>
      <path d="M6,-28 Q10,-38 4,-42 Q0,-44 0,-38"/>
      <path d="M-3,-42 Q-6,-46 -2,-48 Q0,-49 2,-48 Q6,-46 3,-42"/>
      <polygon class="star" points="0,-34 1.2,-31 4,-31 2,-29 3,-26 0,-28 -3,-26 -2,-29 -4,-31 -1.2,-31"/>
    </g>

    <!-- Bottom fleur-de-lis arm -->
    <g class="arm" transform="rotate(180)">
      <path d="M0,-18 L0,-38"/>
      <path d="M-6,-28 Q-10,-38 -4,-42 Q0,-44 0,-38"/>
      <path d="M6,-28 Q10,-38 4,-42 Q0,-44 0,-38"/>
      <!-- Shield at bottom -->
      <path d="M-5,-44 Q-5,-48 0,-50 Q5,-48 5,-44 L3,-42 L-3,-42 Z"/>
    </g>

    <!-- Left fleur-de-lis arm -->
    <g class="arm" transform="rotate(270)">
      <path d="M0,-18 L0,-38"/>
      <path d="M-6,-28 Q-10,-38 -4,-42 Q0,-44 0,-38"/>
      <path d="M6,-28 Q10,-38 4,-42 Q0,-44 0,-38"/>
      <path d="M-3,-42 Q-6,-46 -2,-48 Q0,-49 2,-48 Q6,-46 3,-42"/>
      <polygon class="star" points="0,-34 1.2,-31 4,-31 2,-29 3,-26 0,-28 -3,-26 -2,-29 -4,-31 -1.2,-31"/>
    </g>

    <!-- Diagonal ornamental curves between arms -->
    <!-- Top-right -->
    <path class="arm" d="M10,-15 Q18,-18 15,-10"/>
    <polygon class="star" points="18,-18 19.2,-15.5 22,-15.5 20,-13.5 21,-11 18,-13 15,-11 16,-13.5 14,-15.5 16.8,-15.5" transform="scale(0.7)"/>

    <!-- Bottom-right -->
    <path class="arm" d="M15,10 Q18,18 10,15"/>
    <polygon class="star" points="18,18 19.2,15.5 22,15.5 20,13.5 21,11 18,13 15,11 16,13.5 14,15.5 16.8,15.5" transform="scale(0.7)"/>

    <!-- Bottom-left -->
    <path class="arm" d="M-10,15 Q-18,18 -15,10"/>
    <polygon class="star" points="-18,18 -16.8,15.5 -14,15.5 -16,13.5 -15,11 -18,13 -21,11 -20,13.5 -22,15.5 -19.2,15.5" transform="scale(0.7)"/>

    <!-- Top-left -->
    <path class="arm" d="M-15,-10 Q-18,-18 -10,-15"/>
    <polygon class="star" points="-18,-18 -16.8,-15.5 -14,-15.5 -16,-13.5 -15,-11 -18,-13 -21,-11 -20,-13.5 -22,-15.5 -19.2,-15.5" transform="scale(0.7)"/>
  </g>
</svg>